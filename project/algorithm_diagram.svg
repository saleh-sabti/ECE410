<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" fill="#f8f9fa" rx="10"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Echo Detection Hardware Accelerator — Block Diagram</text>

  <!-- Input A: Far-end Reference -->
  <rect x="20" y="100" width="130" height="60" rx="8" fill="#4a90e2" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="85" y="122" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Far-end Reference</text>
  <text x="85" y="138" text-anchor="middle" font-size="10" fill="#d0e8ff">Signal (speaker out)</text>
  <text x="85" y="153" text-anchor="middle" font-size="10" fill="#d0e8ff">x[n]</text>

  <!-- Input B: Near-end Mic -->
  <rect x="20" y="240" width="130" height="60" rx="8" fill="#4a90e2" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="85" y="262" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Near-end Mic</text>
  <text x="85" y="278" text-anchor="middle" font-size="10" fill="#d0e8ff">Signal (microphone)</text>
  <text x="85" y="293" text-anchor="middle" font-size="10" fill="#d0e8ff">d[n]</text>

  <!-- Arrows from inputs to shift registers -->
  <line x1="150" y1="130" x2="195" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="270" x2="195" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Shift Register A (reference buffer) -->
  <rect x="195" y="100" width="140" height="60" rx="8" fill="#7b68ee" stroke="#5a4db0" stroke-width="1.5"/>
  <text x="265" y="122" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Shift Register</text>
  <text x="265" y="138" text-anchor="middle" font-size="10" fill="#ddd">(reference buffer)</text>
  <text x="265" y="153" text-anchor="middle" font-size="10" fill="#ddd">N taps</text>

  <!-- Shift Register B (mic buffer) -->
  <rect x="195" y="240" width="140" height="60" rx="8" fill="#7b68ee" stroke="#5a4db0" stroke-width="1.5"/>
  <text x="265" y="262" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Shift Register</text>
  <text x="265" y="278" text-anchor="middle" font-size="10" fill="#ddd">(mic buffer)</text>
  <text x="265" y="293" text-anchor="middle" font-size="10" fill="#ddd">N taps</text>

  <!-- Arrows from shift registers to MAC array -->
  <line x1="335" y1="130" x2="390" y2="190" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="335" y1="270" x2="390" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MAC Array -->
  <rect x="390" y="165" width="140" height="70" rx="8" fill="#e8773a" stroke="#c05a20" stroke-width="1.5"/>
  <text x="460" y="187" text-anchor="middle" font-size="11" fill="white" font-weight="bold">MAC Array</text>
  <text x="460" y="203" text-anchor="middle" font-size="10" fill="#ffe0cc">(cross-correlation)</text>
  <text x="460" y="219" text-anchor="middle" font-size="10" fill="#ffe0cc">N parallel multipliers</text>

  <!-- Arrow to Normalizer -->
  <line x1="530" y1="200" x2="580" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Normalizer -->
  <rect x="580" y="165" width="110" height="70" rx="8" fill="#5cb85c" stroke="#3d7a3d" stroke-width="1.5"/>
  <text x="635" y="192" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Normalizer</text>
  <text x="635" y="208" text-anchor="middle" font-size="10" fill="#d0f0d0">÷ energy</text>
  <text x="635" y="223" text-anchor="middle" font-size="10" fill="#d0f0d0">ρ ∈ [−1, 1]</text>

  <!-- Arrow to Threshold Comparator -->
  <line x1="690" y1="200" x2="735" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Threshold Comparator (diamond) -->
  <polygon points="760,170 800,200 760,230 720,200" fill="#d9534f" stroke="#a02020" stroke-width="1.5"/>
  <text x="760" y="196" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ρ &gt; τ ?</text>
  <text x="760" y="209" text-anchor="middle" font-size="9" fill="#ffd0d0">threshold</text>

  <!-- Output YES -->
  <line x1="800" y1="200" x2="840" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="193" text-anchor="middle" font-size="10" fill="#333">YES</text>
  <rect x="840" y="170" width="50" height="60" rx="6" fill="#5cb85c" stroke="#3d7a3d" stroke-width="1.5"/>
  <text x="865" y="196" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Out=1</text>
  <text x="865" y="210" text-anchor="middle" font-size="9" fill="#d0f0d0">echo!</text>
  <text x="865" y="223" text-anchor="middle" font-size="9" fill="#d0f0d0">cancel</text>

  <!-- Output NO -->
  <line x1="760" y1="230" x2="760" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="772" y="278" text-anchor="middle" font-size="10" fill="#333">NO</text>
  <rect x="720" y="320" width="80" height="55" rx="6" fill="#777" stroke="#555" stroke-width="1.5"/>
  <text x="760" y="344" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Out=0</text>
  <text x="760" y="358" text-anchor="middle" font-size="9" fill="#ddd">pass through</text>
  <text x="760" y="371" text-anchor="middle" font-size="9" fill="#ddd">no action</text>

  <!-- Clock note -->
  <text x="450" y="395" text-anchor="middle" font-size="10" fill="#888">All N MACs fire in a single clock cycle — embarrassingly parallel</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>